<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Family Feud — Quiz Master</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;600;700&family=Barlow+Condensed:wght@600;700;900&display=swap" rel="stylesheet">
<style>
/* ─── BASE ───────────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#07101f; --blue:#0d1c42; --mid:#122057; --tile:#17297a;
  --gold:#f5a82a; --gold2:#ffd878; --red:#c0392b; --green:#1e9e56;
  --white:#eef2ff; --muted:rgba(238,242,255,.5);
}
html,body{height:100%;margin:0;padding:0;background:#0b1528;color:var(--white);font-family:'Barlow',sans-serif;overflow:hidden}
button{cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:.08em;border:none;transition:all .15s}

/* ─── BUTTONS ────────────────────────────────────────────── */
.btn{padding:.6rem 1.5rem;border-radius:6px;font-size:1rem;text-transform:uppercase}
.btn-lg{font-size:1.25rem;padding:.85rem 2.5rem}
.btn-sm{font-size:.8rem;padding:.4rem .9rem}
.btn-gold{background:linear-gradient(135deg,var(--gold),#e0930a);color:#07101f}
.btn-gold:hover{filter:brightness(1.12)}
.btn-outline{background:transparent;color:var(--white);border:2px solid rgba(255,255,255,.25)}
.btn-outline:hover{border-color:var(--gold);color:var(--gold)}
.btn-red{background:var(--red);color:#fff}
.btn-red:hover{background:#a72d22}
.btn-green{background:var(--green);color:#fff}
.btn-green:hover{background:#178045}
.btn-blue{background:#2563eb;color:#fff}
.btn-blue:hover{background:#1d55c9}
.btn-disabled{opacity:.35;pointer-events:none}

/* ─── LAYOUT ─────────────────────────────────────────────── */
.qm-wrap{display:flex;flex-direction:column;height:100vh;background:#0b1528;border-left:2px solid rgba(245,168,42,.3)}

/* ─── QM HEADER ──────────────────────────────────────────── */
.qm-head{display:flex;align-items:center;justify-content:space-between;padding:.8rem 1rem;background:rgba(245,168,42,.1);border-bottom:1px solid rgba(245,168,42,.2);flex-shrink:0}
.qm-head-title{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;color:var(--gold);letter-spacing:.08em}
.qm-head-sub{font-size:.65rem;letter-spacing:.15em;color:var(--muted);text-transform:uppercase;margin-top:.1rem}
.qm-status{display:flex;align-items:center;gap:.4rem;font-family:'Barlow Condensed',sans-serif;font-size:.7rem;letter-spacing:.1em;text-transform:uppercase}
.qm-status-dot{width:8px;height:8px;border-radius:50%;background:var(--muted)}
.qm-status-dot.live{background:#22c55e;box-shadow:0 0 6px rgba(34,197,94,.6)}
.qm-status-dot.waiting{background:var(--gold);animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
.qm-reset-btn{background:rgba(192,57,43,.2);color:rgba(238,242,255,.5);border:1px solid rgba(192,57,43,.3);border-radius:5px;padding:.2rem .55rem;font-size:.9rem;cursor:pointer;transition:all .15s;line-height:1}
.qm-reset-btn:hover{background:rgba(192,57,43,.45);color:#fff;border-color:var(--red)}

/* ─── QM BODY ────────────────────────────────────────────── */
.qm-body{flex:1;overflow-y:auto;padding:.8rem}
.qm-body::-webkit-scrollbar{width:5px}
.qm-body::-webkit-scrollbar-track{background:transparent}
.qm-body::-webkit-scrollbar-thumb{background:rgba(245,168,42,.3);border-radius:3px}

/* ─── QM SECTIONS ────────────────────────────────────────── */
.qm-section{margin-bottom:1.2rem}
.qm-sec-title{font-family:'Barlow Condensed',sans-serif;font-size:.65rem;letter-spacing:.22em;color:var(--gold);text-transform:uppercase;margin-bottom:.5rem;border-bottom:1px solid rgba(245,168,42,.15);padding-bottom:.3rem}
.qm-answer-row{display:flex;align-items:center;gap:.5rem;background:rgba(255,255,255,.05);border-radius:6px;padding:.5rem .7rem;margin-bottom:.4rem}
.qma-num{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;color:var(--gold);min-width:20px;text-align:center}
.qma-text{flex:1;font-size:.85rem;font-weight:600;line-height:1.2}
.qma-pts{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;color:var(--gold2);min-width:30px;text-align:right}
.qma-revealed{opacity:.3;text-decoration:line-through}
.qm-reveal-btn{font-family:'Barlow Condensed',sans-serif;font-size:.7rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;background:var(--green);color:#fff;border-radius:4px;padding:.2rem .5rem;flex-shrink:0}
.qm-reveal-btn:hover{background:#178045}
.qm-reveal-btn.done{background:rgba(255,255,255,.1);color:var(--muted);pointer-events:none}

.qm-ctrl-row{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:.5rem}
.qm-ctrl-row .btn{flex:1;min-width:80px;text-align:center}
.qm-divider{height:1px;background:rgba(255,255,255,.08);margin:.8rem 0}
.qm-note{font-size:.75rem;color:var(--muted);line-height:1.4;background:rgba(255,255,255,.04);border-radius:5px;padding:.5rem .7rem;margin-bottom:.5rem}
.qm-ans-pick .btn{display:block;width:100%;text-align:left;margin-bottom:.4rem;padding:.5rem .8rem;font-size:.85rem;white-space:normal}

.qm-score-row{display:flex;gap:.5rem;margin-bottom:.4rem}
.qm-score-box{flex:1;background:rgba(255,255,255,.06);border-radius:6px;padding:.4rem .6rem;text-align:center}
.qm-score-name{font-size:.65rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
.qm-score-val{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;color:var(--gold);line-height:1}
.qm-round-pts{font-family:'Bebas Neue',sans-serif;font-size:2rem;color:var(--gold2);text-align:center;line-height:1}
.qm-round-pts-lbl{font-size:.6rem;letter-spacing:.18em;color:var(--muted);text-align:center;text-transform:uppercase;margin-bottom:.4rem}

/* ─── Q PICKER ───────────────────────────────────────────── */
.q-pick-list{display:flex;flex-direction:column;gap:.4rem}
.q-pick-item{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:6px;padding:.5rem .7rem;cursor:pointer;font-size:.78rem;line-height:1.3;transition:all .15s}
.q-pick-item:hover{border-color:var(--gold);background:rgba(245,168,42,.08)}
.q-pick-item.used{opacity:.25;pointer-events:none;text-decoration:line-through}

/* ─── WAITING SCREEN ─────────────────────────────────────── */
.qm-waiting{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;text-align:center;padding:2rem;gap:1rem}
.qm-waiting-icon{font-size:3.5rem;opacity:.6}
.qm-waiting-title{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;color:var(--gold);letter-spacing:.08em}
.qm-waiting-sub{font-size:.85rem;color:var(--muted);line-height:1.5}
.qm-waiting-hint{font-size:.72rem;color:rgba(238,242,255,.3);margin-top:.5rem}

/* ─── RESPONSIVE ─────────────────────────────────────────── */
@media(min-width:600px){
  .qm-wrap{max-width:420px;margin:0 auto;border-left:2px solid rgba(245,168,42,.3);border-right:2px solid rgba(245,168,42,.3)}
}
</style>
</head>
<body>

<div class="qm-wrap">

  <!-- Header -->
  <div class="qm-head">
    <div>
      <div class="qm-head-title">🎙 QUIZ MASTER</div>
      <div class="qm-head-sub" id="qm-head-sub">Control Panel</div>
    </div>
    <div style="display:flex;align-items:center;gap:.6rem">
      <div class="qm-status">
        <div class="qm-status-dot" id="status-dot"></div>
        <span id="status-label">Connecting…</span>
      </div>
      <button class="qm-reset-btn" onclick="showResetConfirm()" title="Reset game">↺</button>
    </div>
  </div>

  <!-- Dynamic body -->
  <div class="qm-body" id="qm-body">
    <div class="qm-waiting">
      <div class="qm-waiting-icon">🎙</div>
      <div class="qm-waiting-title">QUIZ MASTER READY</div>
      <div class="qm-waiting-sub">Open the main board and start a match.<br>This panel will sync automatically.</div>
      <div class="qm-waiting-hint">Keep both windows open on the same device or same local network.</div>
    </div>
  </div>

</div>

<script>
/* ═══════════════════════════════════════════════════════════
   QUESTION BANK — identical copy to main board
═══════════════════════════════════════════════════════════ */

  {q:"Name a gripe about your computer you could also have about a partner.",a:[{t:"Too slow",p:68},{t:"Doesn't work / always crashing",p:20},{t:"Won't follow commands",p:5},{t:"Makes too much noise",p:3}]},
  {q:"Name a place where it's perfectly fine to sing — even if you're terrible.",a:[{t:"In the shower / bath",p:61},{t:"At church / a religious service",p:24},{t:"At a karaoke bar",p:8},{t:"In the car",p:4}]},

  {q:"Name something a man takes along when shopping with his wife.",a:[{t:"Cash / wallet / credit cards",p:55},{t:"His phone / earphones",p:24},{t:"Something to read",p:13},{t:"A friend for company",p:4}]},
  {q:"Name something cats do when fighting that rival humans might also do.",a:[{t:"Scratch / claw",p:65},{t:"Screech / hiss",p:14},{t:"Bite",p:12},{t:"Pull hair",p:5}]},
  {q:"Name something an elderly person might love that's wrinkled.",a:[{t:"Their partner / spouse",p:66},{t:"Prunes / dried fruit",p:20},{t:"Old comfy clothes",p:7},{t:"Old photographs",p:4}]},

  {q:"Name something you love doing when you're completely alone.",a:[{t:"Reading",p:28},{t:"Watching TV / films",p:26},{t:"Taking a long bath",p:18},{t:"Dancing like nobody's watching",p:12}]},
  {q:"Name something a housefly dies from that you'd hate as your own cause of death.",a:[{t:"A flyswatter",p:74},{t:"Bug spray / insecticide",p:7},{t:"Starvation",p:6},{t:"Getting stuck on flypaper",p:4}]},
  {q:"Name something you have to squeeze really hard before anything comes out.",a:[{t:"A lemon / citrus fruit",p:28},{t:"Ketchup / mustard bottle",p:25},{t:"Toothpaste",p:20},{t:"A spot or pimple",p:14}]},
  {q:"Name something a man wears trying to impress women that actually repels them.",a:[{t:"Way too much cologne",p:64},{t:"A Speedo",p:10},{t:"A toupee / terrible wig",p:8},{t:"An unbuttoned shirt",p:6}]},

  {q:"Name something a woman brings to bed after a tough breakup.",a:[{t:"Food / ice cream / chocolate",p:40},{t:"Her pet",p:16},{t:"A stuffed animal / teddy bear",p:12},{t:"A good book or magazine",p:8}]},
  {q:"Name something surprising grandparents might still do if they were former hippies.",a:[{t:"Smoke cannabis",p:74},{t:"Dance wildly to old music",p:8},{t:"Kiss passionately in public",p:5},{t:"Wear tie-dye or flower crowns",p:3}]},
  {q:"Name a sign your partner might secretly be turning into a cat.",a:[{t:"Meowing or purring",p:38},{t:"Clawing and scratching everything",p:22},{t:"Growing whiskers",p:18},{t:"Sleeping all day in a sunbeam",p:10}]},
  {q:"Name something a married man gets in trouble for telling others about his wife.",a:[{t:"Her weight / measurements",p:42},{t:"That she snores",p:20},{t:"Her real age",p:16},{t:"Her salary or spending habits",p:10}]},

  {q:"Name something people do in a lift / elevator when completely alone.",a:[{t:"Check their phone",p:40},{t:"Stare at themselves in the mirror",p:24},{t:"Press buttons for no reason",p:16},{t:"Talk or sing to themselves",p:10}]},

  {q:"Name something you start cleaning when procrastinating on something important.",a:[{t:"The kitchen / dishes",p:34},{t:"The bathroom",p:28},{t:"Your desk or workspace",p:16},{t:"Windows or mirrors",p:10}]},

  {q:"Name something people do when they're bored.",a:[{t:"Scroll through their phone",p:42},{t:"Watch TV / stream something",p:26},{t:"Eat snacks",p:16},{t:"Sleep or nap",p:10}]},

  {q:"Name something you do before sleeping that you also do when you wake up.",a:[{t:"Check your phone",p:42},{t:"Brush your teeth",p:30},{t:"Go to the bathroom",p:16},{t:"Drink a glass of water",p:8}]},

/* ═══════════════════════════════════════════════════════════
   LOCAL STATE (read from localStorage, never mutated directly)
═══════════════════════════════════════════════════════════ */
let G = null;

/* ═══════════════════════════════════════════════════════════
   HELPERS (mirror of main board)
═══════════════════════════════════════════════════════════ */
const match          = () => G.bracket[G.currentMatch];
const teamA          = () => G.teams[match().teamA];
const teamB          = () => G.teams[match().teamB];
const tName          = (ab) => ab === 'a' ? teamA() : teamB();
const opp            = (ab) => ab === 'a' ? 'b' : 'a';
const revealedPoints = () => G.q.a.reduce((s,ans,i) => s + (G.revealed[i] ? ans.p : 0), 0);
const allRevealed    = () => G.revealed.every(Boolean);

/* ═══════════════════════════════════════════════════════════
   STATE LOADING
═══════════════════════════════════════════════════════════ */
function loadState() {
  try {
    const raw = localStorage.getItem('ff_state');
    if (!raw) return false;
    const s = JSON.parse(raw);
    s.usedQ = new Set(s.usedQ);
    G = s;
    return true;
  } catch(e) { return false; }
}

/* ═══════════════════════════════════════════════════════════
   COMMAND DISPATCH — sends action to main board via localStorage
   (storage events only fire in OTHER windows, so main board
   will receive this and execute the real game function)
═══════════════════════════════════════════════════════════ */
function dispatch(cmd, args) {
  localStorage.setItem('ff_cmd', JSON.stringify({cmd, args, ts: Date.now()}));
}

// Thin wrappers matching main board function signatures
function selectQuestion(i)            { dispatch('selectQuestion', [i]); }
function buzzWho(ab)                  { dispatch('buzzWho', [ab]); }
function buzzAnswer(idx, isSecond)    { dispatch('buzzAnswer', [idx, isSecond]); }
function choosePlayOrPass(c)          { dispatch('choosePlayOrPass', [c]); }
function revealAnswer(i)              { dispatch('revealAnswer', [i]); }
function addStrike()                  { dispatch('addStrike', []); }
function stealGuess(i)                { dispatch('stealGuess', [i]); }
function doAward()                    { dispatch('doAward', []); }
function startNextRound()             { dispatch('startNextRound', []); }
function endMatch()                   { dispatch('endMatch', []); }
function setPhase(p)                  { dispatch('setPhase', [p]); }
function resetGame()                  { dispatch('resetGame', []); }

/* ═══════════════════════════════════════════════════════════
   RESET CONFIRM UI
═══════════════════════════════════════════════════════════ */
function showResetConfirm() {
  document.getElementById('qm-body').innerHTML = `
    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:80%;padding:2rem;text-align:center;gap:1.2rem">
      <div style="font-size:2.5rem">⚠️</div>
      <div style="font-family:'Bebas Neue',sans-serif;font-size:1.8rem;color:var(--red);letter-spacing:.06em">Reset Game?</div>
      <div style="font-size:.85rem;color:var(--muted);line-height:1.5;max-width:260px">
        This clears all scores and returns to the setup screen.<br>The current match cannot be recovered.
      </div>
      <button class="btn btn-red btn-lg" style="width:100%;max-width:260px;margin-top:.4rem" onclick="confirmReset()">Yes — Reset Everything</button>
      <button class="btn btn-outline" style="width:100%;max-width:260px" onclick="cancelReset()">Cancel</button>
    </div>`;
}

function confirmReset() {
  resetGame();    // dispatch command to main board
  G = null;       // optimistically clear local state
  render();       // show waiting screen immediately
}

function cancelReset() {
  render();       // re-render whatever was showing before
}

/* ═══════════════════════════════════════════════════════════
   CONNECTION STATUS
═══════════════════════════════════════════════════════════ */
function setStatus(live) {
  const dot   = document.getElementById('status-dot');
  const label = document.getElementById('status-label');
  if (live) {
    dot.className   = 'qm-status-dot live';
    label.textContent = 'Live';
  } else {
    dot.className   = 'qm-status-dot waiting';
    label.textContent = 'Waiting…';
  }
}

/* ═══════════════════════════════════════════════════════════
   RENDER
═══════════════════════════════════════════════════════════ */
function render() {
  if (!G || !G.currentMatch) {
    setStatus(!!G);
    showWaiting();
    return;
  }
  setStatus(true);
  renderQM();
}

function showWaiting() {
  document.getElementById('qm-head-sub').textContent = 'Control Panel';
  document.getElementById('qm-body').innerHTML = `
    <div class="qm-waiting">
      <div class="qm-waiting-icon">🎙</div>
      <div class="qm-waiting-title">WAITING FOR MATCH</div>
      <div class="qm-waiting-sub">Start a match on the main board.<br>Controls will appear here automatically.</div>
      <div class="qm-waiting-hint">Both windows must be open in the same browser.</div>
    </div>`;
}

function renderQM() {
  const m = match();
  document.getElementById('qm-head-sub').textContent =
    `${G.currentMatch?.toUpperCase()} · Round ${G.round}`;

  let html = '';

  // ── Scores ──
  html += `<div class="qm-section">
    <div class="qm-sec-title">Match Score</div>
    <div class="qm-score-row">
      <div class="qm-score-box"><div class="qm-score-name">${teamA()}</div><div class="qm-score-val">${m.scoreA}</div></div>
      <div class="qm-score-box"><div class="qm-score-name">${teamB()}</div><div class="qm-score-val">${m.scoreB}</div></div>
    </div>`;
  if (G.q) {
    html += `<div class="qm-round-pts-lbl">Round Points on Board</div>
    <div class="qm-round-pts">${revealedPoints()}</div>`;
  }
  html += '</div>';

  // ── Answers (always visible when Q selected) ──
  if (G.q && G.phase !== 'select_q') {
    html += `<div class="qm-section"><div class="qm-sec-title">Answers (QM Eyes Only)</div>`;
    G.q.a.forEach((ans, i) => {
      const done = G.revealed[i];
      html += `<div class="qm-answer-row ${done ? 'qma-revealed' : ''}">
        <span class="qma-num">${i+1}</span>
        <span class="qma-text">${ans.t}</span>
        <span class="qma-pts">${ans.p}</span>
        ${G.phase === 'playing' && !done
          ? `<button class="qm-reveal-btn" onclick="revealAnswer(${i})">REVEAL</button>`
          : `<span class="qm-reveal-btn done">${done ? '✓' : ''}</span>`}
      </div>`;
    });
    html += '</div>';
  }

  html += '<div class="qm-divider"></div>';

  // ── Phase-specific controls ──
  if (G.phase === 'select_q') {
    html += `<div class="qm-section"><div class="qm-sec-title">Select Question for Round ${G.round}</div>
      <div class="q-pick-list">`;
    Q_BANK.forEach((q, i) => {
      const used = G.usedQ.has(i);
      html += `<div class="q-pick-item ${used ? 'used' : ''}" onclick="${used ? '' : 'selectQuestion(' + i + ')'}">${i+1}. ${q.q}</div>`;
    });
    html += '</div></div>';
  }

  else if (G.phase === 'buzzer') {
    if (G.bStep === 'who') {
      html += `<div class="qm-section"><div class="qm-sec-title">⚡ Who Buzzed First?</div>
        <div class="qm-ctrl-row">
          <button class="btn btn-blue" onclick="buzzWho('a')">${teamA()}</button>
          <button class="btn btn-blue" onclick="buzzWho('b')">${teamB()}</button>
        </div></div>`;
    }
    else if (G.bStep === 'first_ans') {
      html += `<div class="qm-section"><div class="qm-sec-title">${tName(G.bFirst)} answered:</div>
        <div class="qm-ans-pick">`;
      G.q.a.forEach((ans, i) => {
        html += `<button class="btn btn-blue" onclick="buzzAnswer(${i}, false)"><strong>#${i+1}</strong> ${ans.t} (${ans.p}pts)</button>`;
      });
      html += `<button class="btn btn-red" onclick="buzzAnswer(-1, false)">✗ WRONG / Not on board</button>`;
      html += '</div></div>';
    }
    else if (G.bStep === 'second_ans') {
      const buzzedPrev = G.bFirstAns >= 0 ? `#${G.bFirstAns+1} already revealed.` : 'Wrong answer.';
      html += `<div class="qm-note">${tName(G.bFirst)}: ${buzzedPrev}<br>${tName(opp(G.bFirst))}'s turn to answer:</div>
        <div class="qm-section"><div class="qm-ans-pick">`;
      G.q.a.forEach((ans, i) => {
        const alreadyRevealed = G.revealed[i];
        html += `<button class="btn btn-blue ${alreadyRevealed ? 'btn-disabled' : ''}" onclick="buzzAnswer(${i}, true)"><strong>#${i+1}</strong> ${ans.t} (${ans.p}pts)${alreadyRevealed ? ' ✓' : ''}</button>`;
      });
      html += `<button class="btn btn-red" onclick="buzzAnswer(-1, true)">✗ WRONG / Not on board</button>`;
      html += '</div></div>';
    }
    else if (G.bStep === 'done') {
      html += `<div class="qm-note">🎯 Control: <strong>${tName(G.bControl)}</strong></div>
        <div class="qm-section"><div class="qm-sec-title">${tName(G.bControl)}: Play or Pass?</div>
        <div class="qm-ctrl-row">
          <button class="btn btn-green" onclick="choosePlayOrPass('play')">▶ PLAY</button>
          <button class="btn btn-red" onclick="choosePlayOrPass('pass')">↩ PASS</button>
        </div></div>`;
    }
  }

  else if (G.phase === 'playing') {
    html += `<div class="qm-section"><div class="qm-sec-title">${tName(G.playingTeam)} is playing</div>
      <div class="qm-note">Click REVEAL when they name a correct answer.<br>Click STRIKE for a wrong answer.</div>
      <div class="qm-ctrl-row" style="margin-top:.5rem">
        <button class="btn btn-red" onclick="addStrike()">✗ STRIKE (${G.strikes}/2)</button>
      </div>`;
    if (G.strikes >= 2) {
      html += `<div class="qm-divider"></div>
        <div class="qm-note" style="border:1px solid var(--red)">2 strikes! Offer steal to <strong>${tName(G.stealTeam)}</strong></div>
        <button class="btn btn-red btn-lg" style="width:100%;margin-top:.4rem" onclick="setPhase('steal')">⚡ GO TO STEAL →</button>`;
    }
    if (allRevealed()) {
      html += `<div class="qm-divider"></div>
        <button class="btn btn-green btn-lg" style="width:100%" onclick="setPhase('award_playing')">All Revealed — Award to ${tName(G.playingTeam)}</button>`;
    }
    html += '</div>';
  }

  else if (G.phase === 'steal') {
    html += `<div class="qm-section"><div class="qm-sec-title">⚡ STEAL — ${tName(G.stealTeam)}</div>
      <div class="qm-note">One guess only! Select what they said:</div>
      <div class="qm-ans-pick">`;
    G.q.a.forEach((ans, i) => {
      const alreadyRevealed = G.revealed[i];
      html += `<button class="btn btn-blue ${alreadyRevealed ? 'btn-disabled' : ''}" onclick="stealGuess(${i})"><strong>#${i+1}</strong> ${ans.t} (${ans.p}pts)${alreadyRevealed ? ' ✓ already revealed' : ''}</button>`;
    });
    html += `<button class="btn btn-red" onclick="stealGuess(-1)">✗ WRONG — Playing team keeps points</button>`;
    html += '</div></div>';
  }

  else if (G.phase === 'award_playing' || G.phase === 'award_steal') {
    const winner = G.phase === 'award_steal' ? G.stealTeam : G.playingTeam;
    const pts = revealedPoints();
    html += `<div class="qm-section">
      <div class="qm-sec-title">Award Points</div>
      <div class="qm-note" style="font-size:1rem;text-align:center;padding:1rem">
        <strong>${tName(winner)}</strong><br>wins <span style="color:var(--gold);font-size:1.5rem;font-weight:700">${pts} points</span>
      </div>
      <button class="btn btn-gold btn-lg" style="width:100%" onclick="doAward()">✓ CONFIRM & AWARD</button>
    </div>`;
  }

  else if (G.phase === 'between_rounds') {
    html += `<div class="qm-section">
      <div class="qm-sec-title">Round ${G.round} Complete</div>
      <div class="qm-score-row">
        <div class="qm-score-box"><div class="qm-score-name">${teamA()}</div><div class="qm-score-val">${m.scoreA}</div></div>
        <div class="qm-score-box"><div class="qm-score-name">${teamB()}</div><div class="qm-score-val">${m.scoreB}</div></div>
      </div>
      <button class="btn btn-gold btn-lg" style="width:100%;margin-top:.8rem" onclick="startNextRound()">▶ START ROUND ${G.round + 1}</button>
    </div>`;
  }

  else if (G.phase === 'match_end') {
    const winner = m.scoreA >= m.scoreB ? teamA() : teamB();
    html += `<div class="qm-section">
      <div class="qm-sec-title">Match Complete!</div>
      <div class="qm-score-row">
        <div class="qm-score-box"><div class="qm-score-name">${teamA()}</div><div class="qm-score-val">${m.scoreA}</div></div>
        <div class="qm-score-box"><div class="qm-score-name">${teamB()}</div><div class="qm-score-val">${m.scoreB}</div></div>
      </div>
      <div class="qm-note" style="text-align:center;margin-top:.5rem"><strong>${winner}</strong> advances!</div>
      <button class="btn btn-gold btn-lg" style="width:100%;margin-top:.8rem" onclick="endMatch()">→ BACK TO BRACKET</button>
    </div>`;
  }

  document.getElementById('qm-body').innerHTML = html;
}

/* ═══════════════════════════════════════════════════════════
   INIT & STORAGE EVENTS
═══════════════════════════════════════════════════════════ */

// When main board updates or clears state, re-render QM
window.addEventListener('storage', (e) => {
  if (e.key === 'ff_state') {
    if (e.newValue === null) {
      // Game was reset — state removed from localStorage
      G = null;
      render();
    } else if (loadState()) {
      render();
    } else {
      G = null;
      render();
    }
  }
});

// Initial load on page open
if (loadState()) {
  render();
} else {
  setStatus(false);
}
</script>
